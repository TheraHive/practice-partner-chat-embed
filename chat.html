<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Practice Partner</title>
  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
  <link href="therahive.css" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    #chat-root { width: 100%; height: 100vh; position: relative; }

    /* Outer wrapper */
    .chat-window-wrapper {
      position: relative !important;
      width: 100% !important;
      height: 100vh !important;
      max-height: 100vh !important;
      border-radius: 16px !important;
      overflow: hidden !important;
    }

    /* Force chat window visible and filling the page */
    .chat-window {
      display: flex !important;
      flex-direction: column !important;
      position: relative !important;
      bottom: auto !important;
      right: auto !important;
      top: auto !important;
      left: auto !important;
      width: 100% !important;
      height: 100vh !important;
      max-height: 100vh !important;
      border-radius: 16px !important;
      overflow: hidden !important;
      box-shadow: none !important;
    }

    /* Body scrolls, footer stays pinned */
    .chat-body {
      flex: 1 1 auto !important;
      overflow-y: auto !important;
      min-height: 0 !important;
      padding: 12px 16px !important;
    }

    .chat-footer { flex-shrink: 0 !important; }

    /* Hide toggle button */
    .chat-window-toggle { display: none !important; }

    /* Rounded message bubbles */
    .chat-message { border-radius: 18px !important; }

    /* Bot bubble */
    .chat-message-from-bot { margin-left: 8px !important; }

    /* User message bubble — use module primary color */
    .chat-message-from-user {
      background-color: var(--chat--color-primary) !important;
      color: #ffffff !important;
      align-self: flex-end !important;
      margin-right: 8px !important;
    }

    /* Send button — use module primary color */
    .chat-footer button {
      background-color: var(--chat--color-primary) !important;
    }

    /* Header layout */
    .chat-header {
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      padding: 0 16px !important;
      min-height: 56px !important;
      height: 56px !important;
      flex-shrink: 0 !important;
    }

    .chat-heading {
      text-align: center !important;
      width: 100% !important;
      display: block !important;
      line-height: 1.2 !important;
      margin: 0 !important;
      padding: 0 !important;
    }

    .chat-header p {
      display: none !important;
    }

    /* Input padding fix */
    .chat-footer textarea,
    .chat-footer input[type="text"],
    .chat-footer input {
      padding-left: 12px !important;
      border-color: #d1d5db !important;
      box-shadow: none !important;
    }
    .chat-footer textarea:focus,
    .chat-footer input:focus {
      border-color: #9ca3af !important;
      box-shadow: none !important;
      outline: none !important;
    }
    *:focus { --tw-ring-color: #9ca3af !important; }
  </style>
</head>
<body>
  <div id="chat-root"></div>

  <script type="module">
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

    const params = new URLSearchParams(window.location.search);
    const character = params.get('character') || 'nikki';
    const module    = params.get('module')    || 'distress-tolerance';

    // Add a new entry here for each Practice Partner character
    const characterInfo = {
      'nikki': {
        name: 'Nikki',
        skill: 'Pros and Cons',
        initialMessage: "Hi… I just had a really awful experience in class and I'm kind of freaking out. Can you help me figure out what to do?"
      }
    };
    const info = characterInfo[character] || { name: character, skill: 'DBT', initialMessage: '' };

    // Apply module color theme
    document.body.setAttribute('data-module', module);

    createChat({
      webhookUrl: 'https://therahive.app.n8n.cloud/webhook/b4ab7fcf-8bb9-42cf-a444-bf6f8d010051/chat',
      target: '#chat-root',
      defaultOpen: true,
      showWelcomeScreen: false,
      initialMessages: info.initialMessage ? [info.initialMessage] : [],
      metadata: { character: character, module: module }
    });

    // Remove Nathan default messages as soon as they appear in the DOM
    const observer = new MutationObserver(() => {
      document.querySelectorAll('.chat-message-from-bot').forEach(msg => {
        const text = msg.textContent.trim();
        if (text === 'Hi there! 👋' || text.includes('My name is Nathan')) {
          msg.remove();
        }
      });
    });
    observer.observe(document.getElementById('chat-root'), { childList: true, subtree: true });
    // Stop watching after 5 seconds — character's real messages are safe after that
    setTimeout(() => observer.disconnect(), 5000);

    // Use an interval to keep reapplying fixes until the widget fully settles
    // The widget re-injects styles dynamically, which can override one-time setTimeout fixes
    let fixAttempts = 0;
    const fixInterval = setInterval(() => {
      fixAttempts++;

      // Force chat window visible (widget sets display:none when closed)
      const chatWindow = document.querySelector('.chat-window');
      if (chatWindow) {
        chatWindow.style.setProperty('display', 'flex', 'important');
        chatWindow.style.borderRadius = '16px';
        chatWindow.style.overflow = 'hidden';
      }

      const wrapper = document.querySelector('.chat-window-wrapper');
      if (wrapper) {
        wrapper.style.borderRadius = '16px';
        wrapper.style.overflow = 'hidden';
      }

      // Header: vertical centering
      const header = document.querySelector('.chat-header');
      if (header) {
        header.style.display = 'flex';
        header.style.alignItems = 'center';
        header.style.justifyContent = 'center';
        header.style.height = '56px';
        header.style.minHeight = '56px';
        header.style.padding = '0 16px';
        header.style.setProperty('padding-top', '0', 'important');
        header.style.setProperty('padding-bottom', '0', 'important');
      }

      // Override header text
      const heading = document.querySelector('.chat-heading');
      if (heading) {
        heading.textContent = 'Guide ' + info.name + ' through the ' + info.skill + ' Skill';
        heading.style.textAlign = 'center';
        heading.style.width = '100%';
        heading.style.display = 'block';
        heading.style.margin = '0';
        heading.style.padding = '0';
        heading.style.lineHeight = '1.2';
      }

      // Hide subtitle
      const subtitle = document.querySelector('.chat-header p');
      if (subtitle) subtitle.style.display = 'none';

      // Input placeholder + padding
      const textarea = document.querySelector('.chat-footer textarea, .chat-footer input');
      if (textarea) {
        textarea.setAttribute('placeholder', 'Chat with ' + info.name + '…');
        textarea.style.setProperty('padding-left', '12px', 'important');
      }

      // Keep toggle hidden
      const toggle = document.querySelector('.chat-window-toggle');
      if (toggle) toggle.style.display = 'none';

      // Stop after 20 attempts (~4 seconds) — widget has fully settled by then
      if (fixAttempts >= 20) {
        clearInterval(fixInterval);
      }
    }, 200);
  </script>
</body>
</html>
