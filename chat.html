<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Practice Partner</title>
  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
  <link href="therahive.css" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    #chat-root { width: 100%; height: 100%; }

    :root {
      --chat--window--border-radius: 0;
      --chat--header--padding: 0.875rem 1rem;
      --chat--heading--font-size: 1rem;
      --chat--subtitle--font-size: 0px;
      --chat--subtitle--line-height: 0;
      --chat--message--border-radius: 18px;
      --chat--toggle--size: 0px;
      --chat--toggle--width: 0px;
      --chat--toggle--height: 0px;
    }

    body {
      --chat--message--user--background: var(--chat--color-primary);
      --chat--message--user--color: #ffffff;
      --chat--input--send--button--background: var(--chat--color-primary);
      --chat--input--send--button--color: #ffffff;
      --chat--input--send--button--background-hover: var(--chat--color-primary);
      --chat--input--send--button--color-hover: #ffffff;
    }

    .chat-window-wrapper {
      position: relative !important;
      width: 100% !important;
      height: 100vh !important;
      max-height: 100vh !important;
    }

    .chat-window {
      display: flex !important;
      flex-direction: column !important;
      position: relative !important;
      top: 0 !important;
      left: 0 !important;
      right: auto !important;
      bottom: auto !important;
      width: 100% !important;
      height: 100vh !important;
      max-height: 100vh !important;
      max-width: 100% !important;
      box-shadow: none !important;
    }

    .chat-body {
      flex: 1 1 auto !important;
      overflow-y: auto !important;
      min-height: 0 !important;
    }

    .chat-footer {
      flex-shrink: 0 !important;
      padding-left: 0.75rem !important;
      padding-right: 0.75rem !important;
      padding-bottom: 0.5rem !important;
    }

    .chat-input { padding-left: 0.75rem !important; }

    .chat-header p { display: none !important; }

    .chat-message-from-bot  { margin-left: 8px !important; }
    .chat-message-from-user { margin-right: 8px !important; }

    .chat-window-toggle { display: none !important; }

    .chat-window  { border-radius: 0 !important; }
    .chat-header  { border-radius: 0 !important; }
    .chat-footer  { border-radius: 0 !important; }
    .chat-body    { border-radius: 0 !important; }
  </style>
</head>
<body>
  <div id="chat-root"></div>

  <script type="module">
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

    const params = new URLSearchParams(window.location.search);
    const character = params.get('character') || 'nikki';
    const module    = params.get('module')    || 'distress-tolerance';

    const characterInfo = {
      'nikki': {
        name: 'Nikki',
        skill: 'Pros and Cons',
        initialMessage: "Hi… I just had a really awful experience in class and I'm kind of freaking out. Can you help me figure out what to do?"
      }
    };
    const info = characterInfo[character] || { name: character, skill: 'DBT', initialMessage: '' };

    document.body.setAttribute('data-module', module);

    // Force a fresh session on every page load
    // The widget stores sessionId in localStorage — clearing it ensures
    // each visit starts a new conversation with clean memory
    localStorage.removeItem('n8n-chat-session-id');

    // Fetch system prompt from character/<character>.md
    // Falls back to empty string if file not found
    let systemMessage = '';
    try {
      const res = await fetch(`character/${character}.md`);
      if (res.ok) systemMessage = await res.text();
    } catch (e) {
      console.warn('Could not load system message for', character);
    }

    createChat({
      webhookUrl: 'https://therahive.app.n8n.cloud/webhook/b4ab7fcf-8bb9-42cf-a444-bf6f8d010051/chat',
      target: '#chat-root',
      defaultOpen: true,
      showWelcomeScreen: false,
      initialMessages: info.initialMessage ? [info.initialMessage] : [],
      metadata: { character, module, systemMessage }
    });

    // Remove Nathan default messages
    const observer = new MutationObserver(() => {
      document.querySelectorAll('.chat-message-from-bot').forEach(msg => {
        const t = msg.textContent.trim();
        if (t === 'Hi there! 👋' || t.includes('My name is Nathan')) msg.remove();
      });
    });
    observer.observe(document.getElementById('chat-root'), { childList: true, subtree: true });
    setTimeout(() => observer.disconnect(), 5000);

    setTimeout(() => {
      const win = document.querySelector('.chat-window');
      if (win) win.style.setProperty('display', 'flex', 'important');

      const header = document.querySelector('.chat-header');
      if (header) {
        header.style.display = 'flex';
        header.style.alignItems = 'center';
        header.style.justifyContent = 'center';
        header.style.padding = '1.25rem 1rem';
      }

      const heading = document.querySelector('.chat-heading');
      if (heading) {
        heading.textContent = `Guide ${info.name} through the ${info.skill} Skill`;
        heading.style.textAlign = 'center';
        heading.style.width = '100%';
        heading.style.display = 'block';
      }

      const sub = document.querySelector('.chat-header p');
      if (sub) sub.remove();

      const toggle = document.querySelector('.chat-window-toggle');
      if (toggle) toggle.style.display = 'none';
    }, 400);

    const wantedPlaceholder = `Chat with ${info.name}…`;

    const fixPlaceholder = () => {
      const input = document.querySelector(
        '.chat-input textarea, .chat-inputs textarea, .chat-input input'
      );
      if (input && input.getAttribute('placeholder') !== wantedPlaceholder) {
        input.setAttribute('placeholder', wantedPlaceholder);
      }
    };

    const placeholderObserver = new MutationObserver(fixPlaceholder);
    placeholderObserver.observe(document.getElementById('chat-root'), {
      childList: true, subtree: true,
      attributes: true, attributeFilter: ['placeholder']
    });
    setTimeout(() => placeholderObserver.disconnect(), 6000);
  </script>
</body>
</html>
