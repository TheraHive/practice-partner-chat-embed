<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Practice Partner</title>
  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
  <link href="therahive.css" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #ffffff; }
    #chat-root { width: 100%; height: 100vh; position: relative; }
    .chat-window-wrapper { position: relative !important; width: 100% !important; height: 100vh !important; max-height: 100vh !important; }
    .chat-window {
      display: flex !important; flex-direction: column !important;
      position: relative !important; bottom: auto !important; right: auto !important;
      top: auto !important; left: auto !important; width: 100% !important;
      height: 100vh !important; max-height: 100vh !important;
      border-radius: 0 !important; box-shadow: none !important;
    }
    .chat-body { flex: 1 1 auto !important; overflow-y: auto !important; min-height: 0 !important; }
    .chat-footer { flex-shrink: 0 !important; }
    .chat-window-toggle { display: none !important; }
    .chat-message { border-radius: 18px !important; }
    .chat-message-from-user {
      background-color: var(--chat--color-primary) !important;
      color: #ffffff !important;
      align-self: flex-end !important;
    }
    .chat-footer textarea, .chat-footer input[type="text"], .chat-footer input {
      border-color: #d1d5db !important; box-shadow: none !important;
    }
    .chat-footer textarea:focus, .chat-footer input:focus {
      border-color: #9ca3af !important; box-shadow: none !important; outline: none !important;
    }
    *:focus { --tw-ring-color: #9ca3af !important; }
    .chat-footer button { background-color: var(--chat--color-primary) !important; }
  </style>
</head>
<body>
  <div id="chat-root"></div>
  <script type="module">
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

    const params = new URLSearchParams(window.location.search);
    const character = params.get('character') || 'nikki';
    const module    = params.get('module')    || 'distress-tolerance';

    const characterInfo = { 'nikki': { name: 'Nikki', skill: 'Pros and Cons' } };
    const info = characterInfo[character] || { name: character, skill: 'DBT' };

    document.body.setAttribute('data-module', module);

    createChat({
      webhookUrl: 'https://therahive.app.n8n.cloud/webhook/b4ab7fcf-8bb9-42cf-a444-bf6f8d010051/chat',
      target: '#chat-root',
      defaultOpen: true,
      showWelcomeScreen: false,
      metadata: { character: character, module: module }
    });

    setTimeout(() => {
      const chatWindow = document.querySelector('.chat-window');
      if (chatWindow) chatWindow.style.setProperty('display', 'flex', 'important');

      const heading = document.querySelector('.chat-heading');
      const subtitle = document.querySelector('.chat-header p');
      if (heading) heading.textContent = 'Guide ' + info.name + ' through the ' + info.skill + ' Skill';
      if (subtitle) subtitle.textContent = '';

      const toggle = document.querySelector('.chat-window-toggle');
      if (toggle) toggle.style.display = 'none';
    }, 800);
  </script>
</body>
</html>
