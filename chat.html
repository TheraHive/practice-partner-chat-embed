<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Practice Partner</title>
  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
  <link href="therahive.css" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    #chat-root { width: 100%; height: 100vh; position: relative; }

    .chat-window-wrapper {
      position: relative !important;
      width: 100% !important;
      height: 100vh !important;
      max-height: 100vh !important;
      border-radius: 16px !important;
      overflow: hidden !important;
    }

    .chat-window {
      display: flex !important;
      flex-direction: column !important;
      position: relative !important;
      bottom: auto !important;
      right: auto !important;
      top: auto !important;
      left: auto !important;
      width: 100% !important;
      height: 100vh !important;
      max-height: 100vh !important;
      border-radius: 16px !important;
      overflow: hidden !important;
      box-shadow: none !important;
    }

    .chat-body {
      flex: 1 1 auto !important;
      overflow-y: auto !important;
      min-height: 0 !important;
      padding: 12px 16px !important;
    }

    .chat-footer { flex-shrink: 0 !important; }

    .chat-window-toggle { display: none !important; }

    .chat-message { border-radius: 18px !important; }

    .chat-message-from-bot { margin-left: 8px !important; }

    .chat-message-from-user {
      background-color: var(--chat--color-primary) !important;
      color: #ffffff !important;
      align-self: flex-end !important;
      margin-right: 8px !important;
    }

    .chat-footer button {
      background-color: var(--chat--color-primary) !important;
    }
  </style>
</head>
<body>
  <div id="chat-root"></div>

  <script type="module">
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

    const params = new URLSearchParams(window.location.search);
    const character = params.get('character') || 'nikki';
    const module    = params.get('module')    || 'distress-tolerance';

    const characterInfo = {
      'nikki': {
        name: 'Nikki',
        skill: 'Pros and Cons',
        initialMessage: "Hi… I just had a really awful experience in class and I'm kind of freaking out. Can you help me figure out what to do?"
      }
    };
    const info = characterInfo[character] || { name: character, skill: 'DBT', initialMessage: '' };

    document.body.setAttribute('data-module', module);

    createChat({
      webhookUrl: 'https://therahive.app.n8n.cloud/webhook/b4ab7fcf-8bb9-42cf-a444-bf6f8d010051/chat',
      target: '#chat-root',
      defaultOpen: true,
      showWelcomeScreen: false,
      initialMessages: info.initialMessage ? [info.initialMessage] : [],
      metadata: { character: character, module: module }
    });

    const observer = new MutationObserver(() => {
      document.querySelectorAll('.chat-message-from-bot').forEach(msg => {
        const text = msg.textContent.trim();
        if (text === 'Hi there! 👋' || text.includes('My name is Nathan')) {
          msg.remove();
        }
      });
    });
    observer.observe(document.getElementById('chat-root'), { childList: true, subtree: true });
    setTimeout(() => observer.disconnect(), 5000);

    setTimeout(() => {
      // Force window visible
      const chatWindow = document.querySelector('.chat-window');
      if (chatWindow) {
        chatWindow.style.setProperty('display', 'flex', 'important');
        chatWindow.style.borderRadius = '16px';
        chatWindow.style.overflow = 'hidden';
      }

      // Round the outer wrapper too
      const wrapper = document.querySelector('.chat-window-wrapper');
      if (wrapper) {
        wrapper.style.borderRadius = '16px';
        wrapper.style.overflow = 'hidden';
      }

      // Vertically + horizontally center header
      const header = document.querySelector('.chat-header');
      if (header) {
        header.style.display = 'flex';
        header.style.alignItems = 'center';
        header.style.justifyContent = 'center';
        header.style.minHeight = '56px';
        header.style.padding = '8px 16px';
      }

      // Set heading text and center it
      const heading = document.querySelector('.chat-heading');
      if (heading) {
        heading.textContent = 'Guide ' + info.name + ' through the ' + info.skill + ' Skill';
        heading.style.textAlign = 'center';
        heading.style.width = '100%';
        heading.style.display = 'block';
      }

      // Clear subtitle
      const subtitle = document.querySelector('.chat-header p');
      if (subtitle) subtitle.textContent = '';

      // Fix input padding and placeholder
      const textarea = document.querySelector('.chat-footer textarea, .chat-footer input');
      if (textarea) {
        textarea.setAttribute('placeholder', 'Chat with ' + info.name + '…');
        textarea.style.paddingLeft = '12px';
      }

      // Hide toggle
      const toggle = document.querySelector('.chat-window-toggle');
      if (toggle) toggle.style.display = 'none';

      // Remove Nathan messages
      document.querySelectorAll('.chat-message-from-bot').forEach(msg => {
        const text = msg.textContent.trim();
        if (text === 'Hi there! 👋' || text.includes('My name is Nathan')) {
          msg.remove();
        }
      });
    }, 800);
  </script>
</body>
</html>
